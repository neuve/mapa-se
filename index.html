    flex-shrink: 0;

  .header-title span { color: var(--gold); font-style: italic; }

  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 0.7rem; color: var(--warm-gray); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  select {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--cream);
    padding: 5px 22px 5px 10px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem;

    background-repeat: no-repeat; background-position: right 7px center; background-size: 10px;

  select option { background: #2C3B2D; color: var(--cream); }
  .counter { font-size: 0.72rem; color: var(--gold); white-space: nowrap; font-weight: 500; }

  /* Loading overlay */
  #loading-overlay {
    position: fixed; inset: 0; background: var(--deep); z-index: 9999;

  .loading-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--cream); font-weight: 300; }
  .loading-title span { color: var(--gold); font-style: italic; }
  .loading-sub { font-size: 0.8rem; color: var(--warm-gray); letter-spacing: 0.05em; }
  .progress-bar-wrap { width: 260px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.4s ease; }
  .loading-name { font-size: 0.75rem; color: var(--sage); min-height: 1.2em; text-align: center; max-width: 300px; }

  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; z-index: 1; }

  .sidebar { width: 340px; background: white; border-left: 1px solid rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  .sidebar-sub { font-size: 0.72rem; color: var(--warm-gray); margin-top: 2px; }
  .list-container { flex: 1; overflow-y: auto; padding: 8px 0; }

  .list-container::-webkit-scrollbar-thumb { background: var(--sage); border-radius: 2px; }

  .therapist-item { padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: background 0.15s; }
  .therapist-item:hover { background: var(--light-sage); }
  .therapist-item.active { background: #E8F5E9; border-left: 3px solid var(--sage); }
  .therapist-name { font-weight: 500; font-size: 0.85rem; color: var(--deep); margin-bottom: 3px; }
  .therapist-location { font-size: 0.72rem; color: var(--warm-gray); }
  .therapist-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

  .tag { font-size: 0.62rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

  .tag-idioma { background: var(--light-sage); color: var(--deep); }

  .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important; padding: 0 !important; overflow: hidden; }

  .leaflet-popup-tip { background: white !important; }
  .leaflet-popup-close-button { color: var(--cream) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; z-index: 10; }

  { nombre: "Daycira Janneth Sánchez Chávez", tel: "8241003894", web: "http://psicoterapiaintegrativa.com.mx/", casos: "Individual, Adolescentes", modalidad: "Online, Presencial", ubicacionTexto: "Monterrey, Nuevo León, Zona Obispado y Vista Hermosa", idiomas: "", especialidad: "Psicoanálisis Lacaniano, Psiconeuroinmunología, Neurodivergencias TDAH", nivel: "Estudiante" }
];

// MAPA
// ============================================================
const map = L.map('map', { center: [23.0, -102.0], zoom: 5, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
}).addTo(map);

const colores = {
  'Estudiante': '#7A9E7E', 'Graduadx': '#C9A96E', 'Practicante certificadx': '#C17A54',
  'Facilitadorx': '#5B7A9E', 'Proveedorx': '#8B5E8B', '': '#8B8378'
};

function crearIcono(nivel) {
  const color = colores[nivel] || '#8B8378';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
    <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24S32 26 32 16C32 7.163 24.837 0 16 0z" fill="${color}" opacity="0.92"/>
    <circle cx="16" cy="16" r="7" fill="white" opacity="0.9"/>
    <circle cx="16" cy="16" r="4" fill="${color}"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -42] });
}

function getWebUrl(web) {
  if (!web) return null;
  if (web.startsWith('http')) return web;
  if (web.startsWith('www.')) return 'https://' + web;
  return null;
}

function crearPopup(t) {
  const webUrl = getWebUrl(t.web);
  const modalidadTags = t.modalidad.split(',').map(m => m.trim()).filter(Boolean).map(m => {
    const cls = m.toLowerCase().includes('online') ? 'tag-online' : m.toLowerCase().includes('presencial') ? 'tag-presencial' : 'tag-domicilio';
    return `<span class="tag ${cls}">${m}</span>`;
  }).join('');

  return `
    <div class="popup-header">
      <div class="popup-name">${t.nombre}</div>
      <div class="popup-city">📍 ${t.ubicacionTexto}</div>
    </div>
    <div class="popup-body">
      <div class="popup-section">
        <div class="popup-section-label">Modalidad</div>
        <div class="popup-tags">${modalidadTags}</div>
      </div>
      ${t.especialidad ? `<div class="popup-section"><div class="popup-section-label">Especialidad</div><div class="popup-section-value">${t.especialidad}</div></div>` : ''}
      <div class="popup-section">
        <div class="popup-section-label">Atiende</div>
        <div class="popup-section-value">${t.casos}</div>
      </div>
      <div class="popup-section"><div class="popup-tags">
        ${t.idiomas ? `<span class="tag tag-idioma">🌐 ${t.idiomas}</span>` : ''}
        ${t.nivel ? `<span class="tag" style="background:#F5F0E8;color:#2C3B2D;">🎓 ${t.nivel}</span>` : ''}
      </div></div>
      ${t.tel ? `<div class="popup-section"><div class="popup-section-label">Contacto</div><div class="popup-section-value">📞 <a href="tel:${t.tel}" style="color:#7A9E7E;text-decoration:none;">${t.tel}</a></div></div>` : ''}
      ${webUrl ? `<a href="${webUrl}" target="_blank" class="popup-link">🌐 Visitar sitio web ↗</a>` : ''}
      <div class="geocode-note">⚠️ Ubicación aproximada inferida por IA — versión de prueba</div>
    </div>
  `;
}

// ============================================================
// GEOCODIFICACIÓN VÍA CLAUDE API
// ============================================================
async function geocodificarLote(terapeutas) {
  const ubicaciones = terapeutas.map((t, i) => `${i}: "${t.ubicacionTexto}"`).join('\n');

  const prompt = `Eres un geocodificador de ubicaciones en México. 
Para cada ubicación en texto libre, devuelve las coordenadas lat/lng más precisas posibles y el nombre de ciudad normalizado.

Ubicaciones:
${ubicaciones}

Responde SOLO con un JSON array con exactamente ${terapeutas.length} objetos, en el mismo orden, con esta estructura:
[{"lat": 19.3467, "lng": -99.1617, "ciudad": "CDMX"}, ...]

Reglas:
- Usa coordenadas del centro de la colonia/zona cuando sea posible
- Para "Zona Poniente CDMX" o similar, usa el centro aproximado de esa zona
- Para ciudades fuera de CDMX, usa el centro de la ciudad
- ciudad debe ser: CDMX, Guadalajara, Monterrey, Puebla, Querétaro, Oaxaca, Veracruz, Cancún, Mérida, Torreón, Durango, Ciudad Juárez, Morelos, o Estado de México según corresponda
- NO incluyas texto adicional, solo el JSON array`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ============================================================
// ESTADO DE LA APP
// ============================================================
let terapeutas = [];
let markers = [];

async function inicializar() {
  const overlay = document.getElementById('loading-overlay');
  const progressBar = document.getElementById('progress-bar');
  const loadingName = document.getElementById('loading-name');

  try {
    // Procesar en lotes de 15 para no sobrecargar el prompt
    const loteSize = 15;
    const lotes = [];
    for (let i = 0; i < rawData.length; i += loteSize) {
      lotes.push(rawData.slice(i, i + loteSize));
    }

    let geocodificados = [];
    for (let li = 0; li < lotes.length; li++) {
      const lote = lotes[li];
      loadingName.textContent = `Procesando: ${lote[0].nombre}...`;
      progressBar.style.width = `${(li / lotes.length) * 90}%`;

      const coords = await geocodificarLote(lote);
      lote.forEach((t, i) => {
        geocodificados.push({ ...t, lat: coords[i].lat, lng: coords[i].lng, ciudad: coords[i].ciudad });
      });
    }

    terapeutas = geocodificados;
    progressBar.style.width = '100%';
    loadingName.textContent = '✓ Listo';

    setTimeout(() => {
      overlay.style.transition = 'opacity 0.5s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 500);
    }, 400);

    poblarCiudades();
    applyFilters();

  } catch (err) {
    loadingName.textContent = '⚠️ Error al geocodificar. Usando coordenadas de respaldo.';
    console.error(err);
    // Fallback: coordenadas genéricas por ciudad conocida
    terapeutas = rawData.map(t => ({ ...t, lat: 19.43, lng: -99.13, ciudad: 'CDMX' }));
    setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 500); }, 1500);
    poblarCiudades();
    applyFilters();
  }
}

function poblarCiudades() {
  const ciudades = [...new Set(terapeutas.map(t => t.ciudad).filter(Boolean))].sort();
  const sel = document.getElementById('filterCiudad');
  ciudades.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const modalidad = document.getElementById('filterModalidad').value;
  const ciudad = document.getElementById('filterCiudad').value;
  const idioma = document.getElementById('filterIdioma').value;
  const nivel = document.getElementById('filterNivel').value;

  markers.forEach(m => map.removeLayer(m));
  markers = [];
  document.getElementById('list-container').innerHTML = '';

  const visibles = terapeutas.filter(t => {
    return (!modalidad || t.modalidad.toLowerCase().includes(modalidad.toLowerCase()))
      && (!ciudad || t.ciudad === ciudad)
      && (!idioma || (t.idiomas || '').toLowerCase().includes(idioma.toLowerCase()))
      && (!nivel || (t.nivel || '').includes(nivel));
  });

  visibles.forEach((t, i) => {
    const marker = L.marker([t.lat, t.lng], { icon: crearIcono(t.nivel) })
      .bindPopup(crearPopup(t), { maxWidth: 300 })
      .addTo(map);

    marker.on('click', () => activarItem(i));
    markers.push(marker);
    agregarALista(t, i, marker);
  });

  document.getElementById('counter').textContent = `${visibles.length} terapeuta${visibles.length !== 1 ? 's' : ''}`;
}

function activarItem(index) {
  document.querySelectorAll('.therapist-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`[data-index="${index}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function agregarALista(t, index, marker) {
  const container = document.getElementById('list-container');
  const modalidadTags = t.modalidad.split(',').map(m => m.trim()).filter(Boolean).map(m => {
    const cls = m.toLowerCase().includes('online') ? 'tag-online' : m.toLowerCase().includes('presencial') ? 'tag-presencial' : 'tag-domicilio';
    return `<span class="tag ${cls}">${m}</span>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'therapist-item';
  el.setAttribute('data-index', index);
  el.innerHTML = `
    <div class="therapist-name">${t.nombre}</div>
    <div class="therapist-location">📍 ${t.ubicacionTexto}</div>
    <div class="therapist-tags">${modalidadTags}${t.idiomas ? `<span class="tag tag-idioma">🌐 ${t.idiomas}</span>` : ''}</div>
  `;
  el.onclick = () => {
    activarItem(index);
    map.setView(marker.getLatLng(), 14, { animate: true });
    marker.openPopup();
  };
  container.appendChild(el);
}

// Arrancar
inicializar();
</script>
